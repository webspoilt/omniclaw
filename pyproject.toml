[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = []
norecursedirs = [".git", ".venv", "node_modules", "legacy", ".next"]

[project.scripts]
omniclaw-cli = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
