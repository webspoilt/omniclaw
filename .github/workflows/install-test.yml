name: Install and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -r requirements.txt

    - name: Verify import
      run: |
        python -c "import sys; sys.path.insert(0, '.'); print('Project root OK')"
        python -c "from core.skills import SkillLoader; print('Skill system import OK')"
